name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Prepare Android debug keystore folder
        run: mkdir -p ~/.android

      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trading-library-debug-keystore-v1
          restore-keys: |
            trading-library-debug-keystore-v1

      - name: Create debug keystore if missing
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Show debug keystore fingerprint
        run: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-baru-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
